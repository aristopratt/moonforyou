<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lunar WebXR Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0B0B14 0%, #030308 100%);
            color: #fff; overflow: hidden; touch-action: none;
        }
        #gl-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; display: block;
        }
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; pointer-events: none;
        }
        .title-group { text-align: center; margin-bottom: 3rem; pointer-events: auto; }
        h1 {
            font-size: 3.5rem; font-weight: 700; letter-spacing: 4px;
            text-transform: uppercase; margin: 0;
            background: linear-gradient(135deg, #E0E4FF 0%, #7681B3 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        p.subtitle { margin-top: 0.5rem; font-size: 1.2rem; color: #A0A5C0; letter-spacing: 1.5px; }
        #vr-button {
            display: none; pointer-events: auto; padding: 1.2rem 4rem;
            font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; color: #fff;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        #vr-button:hover {
            background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 20px rgba(118,129,179,0.4);
        }
        #status-text {
            margin-top: 2rem; font-size: 0.9rem; color: rgba(160,165,192,0.6);
            pointer-events: auto; text-align: center; white-space: pre-line;
        }
    </style>
</head>
<body>
    <canvas id="gl-canvas"></canvas>
    <div id="ui-container">
        <div class="title-group">
            <h1>Lunar Engine</h1>
            <p class="subtitle">PHYSICALLY BASED SIMULATION</p>
        </div>
        <button id="vr-button">ENTER VR</button>
        <div id="status-text">Initializing…</div>
    </div>

    <!-- Basis Universal WASM Transcoder (from local build, no 3rd-party dependency) -->
    <script src="lib/basis_transcoder.js"></script>

    <script type="module" src="engine.js"></script>
</body>
</html>
